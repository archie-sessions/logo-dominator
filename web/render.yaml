services:
  - type: web
    name: logo-dominator
    runtime: python
    rootDir: web
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    packages:
      - ghostscript
      - pdf2svg
      - libcairo2-dev
